<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Portfólio</title>
    <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>

<header>
    <nav>
        <span class="logo">Carlos</span>
        <ul>
            <li><a href="#projetos">Projetos</a></li>
            <li><a href="#habilidades">Habilidades</a></li>
            <li><a href="#experiencias">Experiências</a></li>
            <li><a href="#contatos">Contatos</a></li>
        </ul>
    </nav>
</header>

<section id="hero">
    <div class="hero-content">
        <h1 id="nome">Carregando...</h1>
        <p id="titulo"></p>
        <p id="bio"></p>
    </div>
</section>

<section id="projetos">
    <h2>Projetos</h2>
    <div class="cards" id="lista-projetos"></div>
</section>

<section id="habilidades">
    <h2>Habilidades</h2>
    <div class="tags" id="lista-habilidades"></div>
</section>

<section id="experiencias">
    <h2>Experiências</h2>
    <div class="timeline" id="lista-experiencias"></div>
</section>

<section id="contatos">
    <h2>Contatos</h2>
    <div class="contatos-grid" id="lista-contatos"></div>
</section>

<footer>
    <p>Feito com Java + Spring Boot</p>
</footer>

<script src="/js/main.js"></script>
</body>
</html>
